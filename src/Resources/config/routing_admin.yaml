# Admin proxy API for VideoOptimizer. Imported with prefix /admin/api,
# so all paths below are reachable behind the Sulu admin firewall.

scale_videooptimizer_settings_get:
    path: /videooptimizer/settings
    methods: [GET]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\SettingsController::get'

scale_videooptimizer_settings_put:
    path: /videooptimizer/settings
    methods: [PUT]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\SettingsController::put'

scale_videooptimizer_settings_test:
    path: /videooptimizer/settings/test
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\SettingsController::test'

scale_videooptimizer_settings_token_delete:
    path: /videooptimizer/settings/token
    methods: [DELETE]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\SettingsController::deleteToken'

scale_videooptimizer_encodings_get:
    path: /videooptimizer/encodings
    methods: [GET]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\LibraryController::encodings'

scale_videooptimizer_libraries_cget:
    path: /videooptimizer/libraries
    methods: [GET]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\LibraryController::cget'

scale_videooptimizer_libraries_post:
    path: /videooptimizer/libraries
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\LibraryController::post'

scale_videooptimizer_libraries_patch:
    path: /videooptimizer/libraries/{id}
    methods: [PATCH]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\LibraryController::patch'

scale_videooptimizer_libraries_delete:
    path: /videooptimizer/libraries/{id}
    methods: [DELETE]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\LibraryController::delete'

scale_videooptimizer_library_videos:
    path: /videooptimizer/libraries/{id}/videos
    methods: [GET]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\LibraryController::videos'

scale_videooptimizer_library_reprocess:
    path: /videooptimizer/libraries/{id}/reprocess
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\LibraryController::reprocess'

scale_videooptimizer_videos_cget:
    path: /videooptimizer/videos
    methods: [GET]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::list'

scale_videooptimizer_video_upload_initiate:
    path: /videooptimizer/videos/upload/initiate
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::initiateUpload'

scale_videooptimizer_video_upload_complete:
    path: /videooptimizer/videos/upload/complete
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::completeUpload'

scale_videooptimizer_video_ingest:
    path: /videooptimizer/videos/ingest
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::ingestUrl'

scale_videooptimizer_video_get:
    path: /videooptimizer/videos/{uuid}
    methods: [GET]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::get'
    requirements:
        uuid: '[0-9a-fA-F\-]+'

scale_videooptimizer_video_patch:
    path: /videooptimizer/videos/{uuid}
    methods: [PATCH]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::patch'
    requirements: { uuid: '[0-9a-fA-F\-]+' }

scale_videooptimizer_video_delete:
    path: /videooptimizer/videos/{uuid}
    methods: [DELETE]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::delete'
    requirements: { uuid: '[0-9a-fA-F\-]+' }

scale_videooptimizer_video_thumbnails:
    path: /videooptimizer/videos/{uuid}/thumbnails
    methods: [GET]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::thumbnails'
    requirements: { uuid: '[0-9a-fA-F\-]+' }

scale_videooptimizer_video_thumbnail_select:
    path: /videooptimizer/videos/{uuid}/thumbnail
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::selectThumbnail'
    requirements: { uuid: '[0-9a-fA-F\-]+' }

scale_videooptimizer_video_poster_initiate:
    path: /videooptimizer/videos/{uuid}/poster/initiate
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::posterInitiate'
    requirements: { uuid: '[0-9a-fA-F\-]+' }

scale_videooptimizer_video_poster_complete:
    path: /videooptimizer/videos/{uuid}/poster/complete
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::posterComplete'
    requirements: { uuid: '[0-9a-fA-F\-]+' }

scale_videooptimizer_video_poster_select:
    path: /videooptimizer/videos/{uuid}/poster/select
    methods: [POST]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::posterSelect'
    requirements: { uuid: '[0-9a-fA-F\-]+' }

scale_videooptimizer_video_poster_delete:
    path: /videooptimizer/videos/{uuid}/poster
    methods: [DELETE]
    controller: 'Scale\VideoOptimizerBundle\Controller\Admin\VideoController::posterDelete'
    requirements: { uuid: '[0-9a-fA-F\-]+' }
